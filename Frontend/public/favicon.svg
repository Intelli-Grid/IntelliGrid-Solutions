  <rect x="18" y="5" width="9" height="9" rx="2" fill="white" fill-opacity="0.6"/>
  <rect x="5" y="18" width="9" height="9" rx="2" fill="white" fill-opacity="0.6"/>
  <rect x="18" y="18" width="9" height="9" rx="2" fill="white" fill-opacity="0.95"/>
