  <!-- Canonical -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="preload"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap"
    as="style"
    onload="this.onload=null;this.rel='stylesheet'" />

  </noscript>

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "IntelliGrid",
      "url": "https://www.intelligrid.online",
      "logo": "https://www.intelligrid.online/og-image.jpg",
      "description": "The world's largest curated AI tools directory",
      "sameAs": [
        "https://twitter.com/IntelliGridHQ",
        "https://linkedin.com/company/intelligrid"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@intelligrid.online",
        "contactType": "customer support"
      }
    }
    </script>

  <!-- Cashfree SDK — deferred so it doesn't block first paint -->
  <script src="https://sdk.cashfree.com/js/v3/cashfree.js" defer></script>

  <!-- Structured Data: WebSite with SearchAction -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "IntelliGrid",
      "url": "https://www.intelligrid.online",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.intelligrid.online/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>

        <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">

  <script type="module" src="/src/main.jsx"></script>

</html>
