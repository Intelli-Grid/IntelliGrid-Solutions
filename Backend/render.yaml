# NOTE: The canonical render.yaml is at the repo root (../render.yaml).
# Render reads from the root. This file is kept for reference only.
services:
  - type: web
    name: intelligrid-backend
    env: node
    region: oregon
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - fromGroup: intelligrid-production
