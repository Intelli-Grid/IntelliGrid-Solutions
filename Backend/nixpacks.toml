# nixpacks.toml — Railway build configuration for IntelliGrid backend
#
# Hybrid Node.js + Python Pipeline
# Node.js: Main server, API, DB operations, Slack/Telegram bots
# Python: Anti-detection scraping (TAAFT, AIxploria, Futurepedia) 
#   via curl_cffi (Cloudflare bypass) and nodriver (Headless Chromium for SPAs)

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "chromium"]

[phases.install]
cmds = [
  "npm install --production=false",
  "pip install curl_cffi nodriver beautifulsoup4 pandas lxml pydantic"
]

[start]
cmd = "node src/server.js"
