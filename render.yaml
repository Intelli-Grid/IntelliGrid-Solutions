services:
  - type: web
    name: intelligrid-backend
    env: node
    region: oregon
    # NOTE: rootDir only works via Render Blueprints (IaC).
    # For manually created services, use explicit cd commands instead — same as railway.json.
    buildCommand: cd Backend && npm install
    startCommand: cd Backend && node src/server.js
    healthCheckPath: /health
    envVars:
      - fromGroup: intelligrid-production
