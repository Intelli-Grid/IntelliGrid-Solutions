services:
  - type: web
    name: intelligrid-backend
    env: node
    region: oregon          # us-west-2
    rootDir: Backend        # ← tells Render to cd into Backend/ before build & start
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    # Render auto-injects PORT, RENDER_EXTERNAL_URL, RENDER_EXTERNAL_HOSTNAME
    # All other secrets must be set in the Render dashboard under Environment Variables
    envVars:
      - fromGroup: intelligrid-production
